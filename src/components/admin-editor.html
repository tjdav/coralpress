<template id="admin-editor">
  <form ref="editorForm">
    <p ref="statusMessage" class="text-info"></p>
    
    <div class="mb-3">
      <label for="{{ ref_titleInput }}" class="form-label">Title</label>
      <input type="text" id="{{ ref_titleInput }}" name="title" ref="titleInput" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="{{ ref_slugInput }}" class="form-label">Slug</label>
      <input type="text" id="{{ ref_slugInput }}" name="slug" ref="slugInput" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Content</label>
       <div class="card">
        <div class="card-header d-flex flex-wrap gap-2 p-2 align-items-center">
          <div class="btn-group btn-group-sm" role="group" aria-label="Text Formatting" ref="toolbarText">
            <button type="button" class="btn btn-outline-secondary" data-action="bold" title="Bold"><i class="bi bi-type-bold"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="italic" title="Italic"><i class="bi bi-type-italic"></i></button>
          </div>
          <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              Headings
            </button>
            <ul class="dropdown-menu" ref="toolbarHeadings">
              <li><button class="dropdown-item" type="button" data-action="heading" data-level="1">Heading 1</button></li>
              <li><button class="dropdown-item" type="button" data-action="heading" data-level="2">Heading 2</button></li>
              <li><button class="dropdown-item" type="button" data-action="heading" data-level="3">Heading 3</button></li>
              <li><button class="dropdown-item" type="button" data-action="heading" data-level="4">Heading 4</button></li>
              <li><button class="dropdown-item" type="button" data-action="heading" data-level="5">Heading 5</button></li>
              <li><button class="dropdown-item" type="button" data-action="heading" data-level="6">Heading 6</button></li>
            </ul>
          </div>
          <div class="btn-group btn-group-sm" role="group" aria-label="Text Alignment" ref="toolbarAlign">
            <button type="button" class="btn btn-outline-secondary" data-action="align" data-align="left" title="Align Left"><i class="bi bi-text-left"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="align" data-align="center" title="Align Center"><i class="bi bi-text-center"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="align" data-align="right" title="Align Right"><i class="bi bi-text-right"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="align" data-align="justify" title="Justify"><i class="bi bi-justify"></i></button>
          </div>
          <div class="btn-group btn-group-sm" role="group" aria-label="Lists & Elements" ref="toolbarLists">
            <button type="button" class="btn btn-outline-secondary" data-action="ul" title="Unordered List"><i class="bi bi-list-ul"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="ol" title="Ordered List"><i class="bi bi-list-ol"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="quote" title="Blockquote"><i class="bi bi-blockquote-left"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="hr" title="Horizontal Rule"><i class="bi bi-hr"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="link" title="Link"><i class="bi bi-link"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="image" title="Image"><i class="bi bi-image"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="codeBlock" title="Code Block"><i class="bi bi-code-slash"></i></button>
          </div>
        </div>
        <div class="card-body p-0">
          <div ref="editorContainer" class="p-3" style="min-height: 300px; max-height: 600px; overflow-y: auto;"></div>
        </div>
      </div>
    </div>

    <button type="submit" ref="submitBtn" class="btn btn-primary w-100">Save Post</button>
  </form>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      imports: [
        {
          specifier: '@tiptap/core',
          namedExports: ['Editor']
        },
        {
          specifier: '@tiptap/starter-kit',
          defaultExport: 'StarterKit'
        },
        {
          specifier: '@tiptap/extension-link',
          defaultExport: 'Link'
        },
        {
          specifier: '@tiptap/extension-image',
          defaultExport: 'Image'
        },
        {
          specifier: '@tiptap/extension-text-align',
          defaultExport: 'TextAlign'
        },
        {
          specifier: '../utils/tiptap-code-highlight.js',
          namedExports: ['CodeHighlight']
        }
      ],
      async script ({ values, helpers, imports, signal }) {
        const { Editor, StarterKit, Link, Image, TextAlign, CodeHighlight } = imports
        const form = helpers.refs('editorForm')
        const titleInput = helpers.refs('titleInput')
        const slugInput = helpers.refs('slugInput')
        const editorContainer = helpers.refs('editorContainer')
        const statusMessage = helpers.refs('statusMessage')
        const submitBtn = helpers.refs('submitBtn')
        const toolbarText = helpers.refs('toolbarText')
        const toolbarHeadings = helpers.refs('toolbarHeadings')
        const toolbarAlign = helpers.refs('toolbarAlign')
        const toolbarLists = helpers.refs('toolbarLists')
        const mode = values.mode

        const editor = new Editor({
          element: editorContainer,
          extensions: [
            StarterKit,
            Link.configure({ openOnClick: false }),
            Image,
            TextAlign.configure({ types: ['heading', 'paragraph'] }),
            CodeHighlight
          ],
          content: '',
          editorProps: {
            attributes: {
              class: 'focus-ring',
            },
          },
        })

        // Cleanup editor on signal abort
        signal.addEventListener('abort', () => {
          editor.destroy()
        })

        // Toolbar Logic
        const handleToolbarClick = (e) => {
          const btn = e.target.closest('button')
          if (!btn) return

          const action = btn.dataset.action
          const level = btn.dataset.level ? parseInt(btn.dataset.level, 10) : null
          const align = btn.dataset.align

          if (!action) return

          switch (action) {
            case 'bold':
              editor.chain().focus().toggleBold().run()
              break
            case 'italic':
              editor.chain().focus().toggleItalic().run()
              break
            case 'heading':
              if (level) {
                editor.chain().focus().toggleHeading({ level }).run()
              }
              break
            case 'align':
              if (align) {
                editor.chain().focus().setTextAlign(align).run()
              }
              break
            case 'ul':
              editor.chain().focus().toggleBulletList().run()
              break
            case 'ol':
              editor.chain().focus().toggleOrderedList().run()
              break
            case 'quote':
              editor.chain().focus().toggleBlockquote().run()
              break
            case 'hr':
              editor.chain().focus().setHorizontalRule().run()
              break
            case 'link':
              const previousUrl = editor.getAttributes('link').href
              const url = window.prompt('URL', previousUrl)
              if (url === null) {
                return
              }
              if (url === '') {
                editor.chain().focus().extendMarkRange('link').unsetLink().run()
                return
              }
              editor.chain().focus().extendMarkRange('link').setLink({ href: url }).run()
              break
            case 'image':
              const imgUrl = window.prompt('URL')
              if (imgUrl) {
                editor.chain().focus().setImage({ src: imgUrl }).run()
              }
              break
            case 'codeBlock':
              editor.chain().focus().insertContent({ type: 'codeHighlight' }).run()
              break
          }
        }

        toolbarText.addEventListener('click', handleToolbarClick, { signal })
        toolbarHeadings.addEventListener('click', handleToolbarClick, { signal })
        toolbarAlign.addEventListener('click', handleToolbarClick, { signal })
        toolbarLists.addEventListener('click', handleToolbarClick, { signal })


        if (mode === 'edit') {
          slugInput.disabled = true
          const urlParams = new URLSearchParams(window.location.search)
          const slug = urlParams.get('slug')

          if (slug) {
            slugInput.value = slug
            statusMessage.textContent = 'Loading...'
            try {
              const res = await fetch(`/api/admin/post?slug=${slug}`)
              if (res.ok) {
                const data = await res.json()
                
                // Set the title
                titleInput.value = data.title || ''

                // Set the editor content from JSON
                if (data.content) {
                  editor.commands.setContent(data.content)
                }
                
                statusMessage.textContent = 'Loaded successfully.'
                statusMessage.className = 'text-success'
              } else {
                statusMessage.textContent = 'Failed to load post.'
                statusMessage.className = 'text-danger'
              }
            } catch (err) {
              statusMessage.textContent = 'Error loading post.'
              statusMessage.className = 'text-danger'
              console.error(err)
            }
          } else {
            statusMessage.textContent = 'No slug provided in URL.'
            statusMessage.className = 'text-warning'
          }
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault()
          
          statusMessage.textContent = 'Saving...'
          statusMessage.className = 'text-info'
          submitBtn.disabled = true

          const payload = {
            title: titleInput.value,
            slug: slugInput.value,
            content: editor.getJSON(),
            mode: mode
          }

          try {
            const res = await fetch('/api/admin/commit', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            })

            if (res.ok) {
              statusMessage.textContent = 'Post saved successfully!'
              statusMessage.className = 'text-success'
              if (mode === 'create') {
                window.location.href = `/admin/post/edit.html?slug=${payload.slug}`
              }
            } else {
              const errorData = await res.json()
              statusMessage.textContent = `Error: ${errorData.error || 'Unknown error'}`
              statusMessage.className = 'text-danger'
            }
          } catch (err) {
            statusMessage.textContent = `Error saving post: ${err.message}`
            statusMessage.className = 'text-danger'
            console.error(err)
          } finally {
            submitBtn.disabled = false
          }
        }, { signal })
      }
    }
  })
</script>
