<template id="admin-editor">
  <form ref="editorForm">
    <p ref="statusMessage" class="text-info"></p>
    
    <div class="mb-3">
      <label for="{{ ref_titleInput }}" class="form-label">Title</label>
      <input type="text" id="{{ ref_titleInput }}" name="title" ref="titleInput" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="{{ ref_slugInput }}" class="form-label">Slug</label>
      <input type="text" id="{{ ref_slugInput }}" name="slug" ref="slugInput" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Content</label>
       <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center p-2">
          <div class="btn-group btn-group-sm" role="group" aria-label="Markdown Toolbar" ref="toolbar">
            <button type="button" class="btn btn-outline-secondary" data-action="bold" title="Bold"><i class="bi bi-type-bold"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="italic" title="Italic"><i class="bi bi-type-italic"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="heading" title="Heading"><i class="bi bi-type-h1"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="quote" title="Blockquote"><i class="bi bi-blockquote-left"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="ul" title="Unordered List"><i class="bi bi-list-ul"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="ol" title="Ordered List"><i class="bi bi-list-ol"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="link" title="Link"><i class="bi bi-link"></i></button>
            <button type="button" class="btn btn-outline-secondary" data-action="image" title="Image"><i class="bi bi-image"></i></button>
          </div>
          <button type="button" class="btn btn-sm btn-outline-primary" ref="togglePreviewBtn">Preview</button>
        </div>
        <div class="card-body p-0">
          <div ref="previewContainer" class="d-none p-3 border-bottom markdown-body" style="min-height: 150px; max-height: 400px; overflow-y: auto;"></div>
          <textarea id="{{ ref_contentInput }}" name="content" ref="contentInput" class="form-control border-0 rounded-0 p-3" rows="15" required></textarea>
        </div>
      </div>
    </div>

    <button type="submit" ref="submitBtn" class="btn btn-primary w-100">Save Post</button>
  </form>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      imports: [
        {
          specifier: 'marked',
          namedExports: ['marked']
        },
        {
          specifier: 'dompurify',
          defaultExport: 'DOMPurify'
        }
      ],
      async script ({ values, helpers, imports, signal }) {
        const { marked, DOMPurify } = imports
        const form = helpers.refs('editorForm')
        const titleInput = helpers.refs('titleInput')
        const slugInput = helpers.refs('slugInput')
        const contentInput = helpers.refs('contentInput')
        const statusMessage = helpers.refs('statusMessage')
        const submitBtn = helpers.refs('submitBtn')
        const toolbar = helpers.refs('toolbar')
        const previewContainer = helpers.refs('previewContainer')
        const togglePreviewBtn = helpers.refs('togglePreviewBtn')
        const mode = values.mode

        // Update preview logic
        const updatePreview = () => {
          previewContainer.innerHTML = DOMPurify.sanitize(marked.parse(contentInput.value))
        }

        contentInput.addEventListener('input', updatePreview)

        togglePreviewBtn.addEventListener('click', () => {
          previewContainer.classList.toggle('d-none')
          if (!previewContainer.classList.contains('d-none')) {
            updatePreview()
            togglePreviewBtn.classList.replace('btn-outline-primary', 'btn-primary')
          } else {
            togglePreviewBtn.classList.replace('btn-primary', 'btn-outline-primary')
          }
        }, { signal })

        // Toolbar logic
        const insertMarkdown = (startTag, endTag = '') => {
          const start = contentInput.selectionStart
          const end = contentInput.selectionEnd
          const selectedText = contentInput.value.substring(start, end)
          
          let textToInsert = selectedText
          if (!selectedText && endTag) {
            textToInsert = 'text'
          }

          const beforeText = contentInput.value.substring(0, start)
          const afterText = contentInput.value.substring(end)

          contentInput.value = beforeText + startTag + textToInsert + endTag + afterText
          
          contentInput.focus()
          contentInput.selectionStart = start + startTag.length
          contentInput.selectionEnd = start + startTag.length + textToInsert.length
        }

        toolbar.addEventListener('click', (e) => {
          const btn = e.target.closest('button')
          if (!btn) return

          const action = btn.dataset.action
          switch (action) {
            case 'bold':
              insertMarkdown('**', '**')
              break
            case 'italic':
              insertMarkdown('*', '*')
              break
            case 'heading':
              insertMarkdown('### ', '')
              break
            case 'quote':
              insertMarkdown('> ', '')
              break
            case 'ul':
              insertMarkdown('- ', '')
              break
            case 'ol':
              insertMarkdown('1. ', '')
              break
            case 'link':
              insertMarkdown('[', '](url)')
              break
            case 'image':
              insertMarkdown('![alt text](', ' "Image title")')
              break
          }
          updatePreview()
        }, { signal })

        if (mode === 'edit') {
          slugInput.disabled = true
          const urlParams = new URLSearchParams(window.location.search)
          const slug = urlParams.get('slug')

          if (slug) {
            slugInput.value = slug
            statusMessage.textContent = 'Loading...'
            try {
              const res = await fetch(`/api/admin/post?slug=${slug}`)
              if (res.ok) {
                const data = await res.json()
                contentInput.value = data.content || ''
                updatePreview()
                
                const titleMatch = data.content.match(/<coralite-meta title="(.*?)">/)
                if (titleMatch && titleMatch[1]) {
                  titleInput.value = titleMatch[1]
                } else {
                  titleInput.value = 'Existing Post'
                }
                
                statusMessage.textContent = 'Loaded successfully.'
                statusMessage.className = 'text-success'
              } else {
                statusMessage.textContent = 'Failed to load post.'
                statusMessage.className = 'text-danger'
              }
            } catch (err) {
              statusMessage.textContent = 'Error loading post.'
              statusMessage.className = 'text-danger'
              console.error(err)
            }
          } else {
            statusMessage.textContent = 'No slug provided in URL.'
            statusMessage.className = 'text-warning'
          }
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault()
          
          statusMessage.textContent = 'Saving...'
          statusMessage.className = 'text-info'
          submitBtn.disabled = true

          const payload = {
            title: titleInput.value,
            slug: slugInput.value,
            content: contentInput.value,
            mode: mode
          }

          try {
            const res = await fetch('/api/admin/commit', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            })

            if (res.ok) {
              statusMessage.textContent = 'Post saved successfully!'
              statusMessage.className = 'text-success'
              if (mode === 'create') {
                window.location.href = `/admin/post/edit.html?slug=${payload.slug}`
              }
            } else {
              const errorData = await res.json()
              statusMessage.textContent = `Error: ${errorData.error || 'Unknown error'}`
              statusMessage.className = 'text-danger'
            }
          } catch (err) {
            statusMessage.textContent = `Error saving post: ${err.message}`
            statusMessage.className = 'text-danger'
            console.error(err)
          } finally {
            submitBtn.disabled = false
          }
        }, { signal })
      }
    }
  })
</script>
